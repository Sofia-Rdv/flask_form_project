{% extends 'base.html' %}

{% block content %}
    <h1 class="funny-title">😄 Введите Свои Данные! 🦄</h1>
    <form action="/submit" method="POST" class="funny-form">
        <label for="name">Твое Супер Крутое Имя:</label>
        <input type="text" id="name" name="name" required minlength="2" maxlength="20"><br><br>

        <label for="email">Твоя Потрясающая Эл. Почта:</label>
        <input type="email" id="email" name="email" required placeholder="name@example.com"><br><br>

        <!-- Цвет -->
        <label for="color">Любимый Цвет:</label>
        <input type="color" id="color" name="color" value="#ff69b4">
        <span id="color-preview" style="font-weight:bold;">🎨</span><br><br>

        <!-- Профессия -->
        <label for="profession">Кто Ты По Жизни?</label>
        <select id="profession" name="profession" class="funny-select">
            <option value="Разработчик">Разработчик (Кофеман)</option>
            <option value="Дизайнер">Дизайнер (Рисовака)</option>
            <option value="Менеджер">Менеджер (Тот, кто пишет письма)</option>
        </select><br><br>

        <!-- Хобби (Чекбоксы) -->
        <p>Твои Увлечения:</p>
        <div class="checkboxes">
            <label><input type="checkbox" name="hobbies" value="Книги">📚 Книги</label>
            <label><input type="checkbox" name="hobbies" value="Спорт">⚽️ Спорт</label>
            <label><input type="checkbox" name="hobbies" value="Игры">🎮 Игры</label>
        </div><br>

        <!-- Уровень (радио) -->
        <p>Твой Уровень Мастерства:</p>
        <label><input type="radio" name="level" value="Новичок" checked>🌱 Новичок</label>
        <label><input type="radio" name="level" value="Продвинутый">🚀 Продвинутый</label>

        <button type="submit" class="funny-title">🚀 Вперед!</button>

        <button type="button" id="surprise-btn" class="surprise-button">Кнопка-сюрприз 🎁</button>
        <p id="secret-text" class="secret-message">ТЫ МЕНЯ НАШЕЛ! 🏆</p>
    </form>
{% endblock %}

{% block scripts %}
    <script>
        // Анимация кнопки-сюрприза (Доп. задание 2)
        const sBtn = document.getElementById('surprise-btn');

        sBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            sBtn.style.position = 'fixed';
            sBtn.style.left = x + 'px';
            sBtn.style.top = y + 'px';
        });

        sBtn.addEventListener('click', () => {
            document.getElementById('secret-text').style.display = 'block';
            alert("Поймал!");
        });

        // Превью цвета (Задание 2.2)
        const colorInput = document.getElementById('color');
        colorInput.addEventListener('input', (e) => {
            document.getElementById('color-preview').style.color = e.target.value;
        });
    </script>
{% endblock %}
