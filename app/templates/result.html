<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Твой результат!</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="result-body">
    <div class="funny-form result-card">
        <h1>Ура, {{ name }}! 🎉</h1>

        <div class="user-info">
            <!-- style, так как цвет динамический (из Flask) -->
            <p>🌈 Твой любимый цвет: <span style="color: {{ color }}; font-weight: bold;">{{ color }}</span></p>

            <p>💼 Твоя профессия: <strong>{{ profession }}</strong></p>
            <p>🎮 Твои хобби: <strong>{{ hobbies | join(', ') if hobbies else 'Секретные хобби' }}</strong></p>
            <p>🏆 Твой уровень: <strong>{{ level }}</strong></p>
        </div>

        <div class="joke-container">
            <h4>Случайная шутка для тебя:</h4>
            <p><em>{{ joke }}</em></p>
        </div>

        <a href="/" class="funny-button back-link">Назад к форме</a>
    </div>
</body>
</html>
